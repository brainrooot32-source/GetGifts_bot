<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomGift - Кейсы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .balance {
            font-size: 18px;
            background: #16213e;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .roulette-container {
            overflow: hidden;
            width: 100%;
            max-width: 350px;
            height: 80px;
            border: 3px solid #e94560;
            border-radius: 10px;
            margin: 20px auto;
            position: relative;
            background: #0f3460;
        }
        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #e94560;
            z-index: 10;
        }
        .roulette-tape {
            display: flex;
            width: max-content;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        .prize-card {
            width: 70px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border-right: 1px solid #1a1a2e;
        }
        .btn-spin {
            background: #e94560;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        .btn-spin:disabled { background: #555; }
    </style>
</head>
<body>

    <h2>🎁 Открытие Кейса</h2>
    <div class="balance">Баланс: <span id="stars-balance">150</span> 🌟</div>

    <div class="roulette-container">
        <div class="pointer"></div>
        <div class="roulette-tape" id="tape">
            <!-- Лента призов сгенерируется скриптом -->
        </div>
    </div>

    <button class="btn-spin" id="spin-btn" onclick="spinCase()">Открыть за 50 🌟</button>

    <h3 id="result-text" style="margin-top: 20px; color: #e94560;"></h3>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const prizes = ['⭐', '🎁', '📱', '⭐', '🎫', '💥', '⭐', '🎁'];
        const tape = document.getElementById('tape');
        
        // Заполняем ленту повторяющимися элементами для эффекта бесконечности
        function initTape() {
            tape.innerHTML = '';
            for(let i=0; i<10; i++) {
                prizes.forEach(prize => {
                    const card = document.createElement('div');
                    card.className = 'prize-card';
                    card.innerText = prize;
                    tape.appendChild(card);
                });
            }
        }
        initTape();

        function spinCase() {
            const btn = document.getElementById('spin-btn');
            const resultText = document.getElementById('result-text');
            btn.disabled = true;
            resultText.innerText = "";

            // Случайный сдвиг ленты
            const cardWidth = 71; // ширина + border
            const randomCardIndex = Math.floor(Math.random() * 20) + 40; // мотаем вглубь ленты
            const offset = -(randomCardIndex * cardWidth) + (175 - cardWidth/2); // центрируем выигравший элемент

            tape.style.transform = translateX(${offset}px);
setTimeout(() => {
                const finalPrize = prizes[randomCardIndex % prizes.length];
                resultText.innerText = Вы выиграли: ${finalPrize}!;
                btn.disabled = false;
                
                // Здесь в будущем будет запрос к серверу для обновления баланса
                // tg.sendData(JSON.stringify({prize: finalPrize})); 
            }, 4000); // 4 секунды — время анимации
        }
    </script>
</body>
</html>
